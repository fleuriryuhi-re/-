<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_TITLE}}" />
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      line-height: 1.7;
      color: #222;
      background: #fff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      text-decoration: none;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .updated {
      margin: 0 0 24px;
      color: #666;
      font-size: 0.95rem;
    }

    .content {
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <main class="container">
    <a href="../" class="back-link">← トップページへ戻る</a>
    <h1>{{PAGE_HEADING}}</h1>
    <p class="updated">最終更新日: {{UPDATED_AT}}</p>

    <section class="content">
      <p>このページはテンプレートから作成されました。</p>
      <p>内容を自由に編集してください。</p>
    </section>
  </main>
</body>
</html>
